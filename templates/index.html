<!-- 
==============================================================================
LOAN PREDICTION SYSTEM - FRONTEND (HTML)
This is the user interface of the web application
==============================================================================
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loan Prediction System</title>
    <!-- Link to CSS file for styling -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <!-- Main container -->
    <div class="container">
      <!-- Header section -->
      <div class="header">
        <h1>🏦 Loan Prediction System</h1>
        <p>Fill the form below to predict your loan approval status</p>
      </div>

      <!-- Main content area -->
      <div class="main-content">
        <!-- Left side: Form -->
        <div class="form-section">
          <form id="loanForm">
            <!-- Title -->
            <h2>Applicant Information</h2>

            <!-- Row 1: Gender and Marital Status -->
            <div class="form-row">
              <div class="form-group">
                <label for="gender">Gender *</label>
                <select id="gender" name="gender" required>
                  <option value="">Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                </select>
              </div>

              <div class="form-group">
                <label for="married">Married *</label>
                <select id="married" name="married" required>
                  <option value="">Select Status</option>
                  <option value="Yes">Yes</option>
                  <option value="No">No</option>
                </select>
              </div>
            </div>

            <!-- Row 2: Dependents and Education -->
            <div class="form-row">
              <div class="form-group">
                <label for="dependents">Number of Dependents *</label>
                <select id="dependents" name="dependents" required>
                  <option value="">Select Number</option>
                  <option value="0">0</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4 or more</option>
                </select>
              </div>

              <div class="form-group">
                <label for="education">Education *</label>
                <select id="education" name="education" required>
                  <option value="">Select Education</option>
                  <option value="Graduate">Graduate</option>
                  <option value="NotGraduate">Not Graduate</option>
                </select>
              </div>
            </div>

            <!-- Row 3: Self Employed and Credit History -->
            <div class="form-row">
              <div class="form-group">
                <label for="self_employed">Self Employed *</label>
                <select id="self_employed" name="self_employed" required>
                  <option value="">Select Status</option>
                  <option value="Yes">Yes</option>
                  <option value="No">No</option>
                </select>
              </div>

              <div class="form-group">
                <label for="credit_history">Credit History *</label>
                <select id="credit_history" name="credit_history" required>
                  <option value="">Select Status</option>
                  <option value="1">Yes (1)</option>
                  <option value="0">No (0)</option>
                </select>
              </div>
            </div>

            <!-- Row 4: Income and Loan Amount -->
            <div class="form-row">
              <div class="form-group">
                <label for="applicant_income">Applicant Income (₹) *</label>
                <input
                  type="number"
                  id="applicant_income"
                  name="applicant_income"
                  placeholder="e.g., 50000"
                  min="0"
                  required
                />
              </div>

              <div class="form-group">
                <label for="loan_amount">Loan Amount (₹) *</label>
                <input
                  type="number"
                  id="loan_amount"
                  name="loan_amount"
                  placeholder="e.g., 25000"
                  min="0"
                  required
                />
              </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit" id="submitBtn">
              Predict Loan Status
            </button>
          </form>
        </div>

        <!-- Right side: Results Section -->
        <div class="result-section">
          <!-- Hidden by default, shown when prediction is made -->
          <div id="resultBox" class="result-box hidden">
            <h2>Prediction Result</h2>

            <!-- Prediction status (Approved/Rejected) -->
            <div id="predictionStatus" class="prediction-status">
              <!-- This will be filled by JavaScript -->
            </div>

            <!-- Confidence score -->
            <div class="confidence-section">
              <p><strong>Confidence Level:</strong></p>
              <div id="confidenceScore" class="confidence-score">
                <!-- This will be filled by JavaScript -->
              </div>
            </div>

            <!-- Information box -->
            <div class="info-box">
              <p>
                <small
                  >⚠️ This is a prediction based on machine learning. For actual
                  loan approval, contact your bank.</small
                >
              </p>
            </div>

            <!-- Clear button to reset form -->
            <button type="button" class="btn-clear" id="clearBtn">
              Clear Results
            </button>
          </div>

          <!-- Error message box (hidden by default) -->
          <div id="errorBox" class="error-box hidden">
            <h3>❌ Error</h3>
            <p id="errorMessage"></p>
            <button type="button" class="btn-clear" id="clearErrorBtn">
              Dismiss
            </button>
          </div>

          <!-- Loading spinner (shown while predicting) -->
          <div id="loadingBox" class="loading-box hidden">
            <div class="spinner"></div>
            <p>Making prediction...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- JavaScript code for handling form submission -->
    <script>
      // Get references to HTML elements
      const form = document.getElementById("loanForm");
      const submitBtn = document.getElementById("submitBtn");
      const resultBox = document.getElementById("resultBox");
      const errorBox = document.getElementById("errorBox");
      const loadingBox = document.getElementById("loadingBox");
      const predictionStatus = document.getElementById("predictionStatus");
      const confidenceScore = document.getElementById("confidenceScore");

      // When user clicks "Predict" button, this function runs
      form.addEventListener("submit", async function (e) {
        e.preventDefault(); // Prevent page reload

        // Show loading spinner, hide previous results
        loadingBox.classList.remove("hidden");
        resultBox.classList.add("hidden");
        errorBox.classList.add("hidden");
        submitBtn.disabled = true; // Disable button while processing

        try {
          // Collect form data
          const formData = {
            gender: document.getElementById("gender").value,
            married: document.getElementById("married").value,
            dependents: document.getElementById("dependents").value,
            education: document.getElementById("education").value,
            self_employed: document.getElementById("self_employed").value,
            applicant_income: document.getElementById("applicant_income").value,
            loan_amount: document.getElementById("loan_amount").value,
            credit_history: document.getElementById("credit_history").value,
          };

          // Send data to backend server using AJAX
          const response = await fetch("/predict", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formData),
          });

          // Parse the response from server
          const data = await response.json();

          // Hide loading spinner
          loadingBox.classList.add("hidden");

          if (data.success) {
            // Show prediction result
            const statusClass = data.approved ? "approved" : "rejected";
            const statusText = data.approved ? "✓ APPROVED" : "✗ REJECTED";
            const statusIcon = data.approved ? "🎉" : "⚠️";

            predictionStatus.innerHTML = `
                        <div class="status-badge ${statusClass}">
                            <span class="icon">${statusIcon}</span>
                            <span class="text">${statusText}</span>
                        </div>
                    `;

            confidenceScore.innerHTML = `
                        <div class="confidence-bar">
                            <div class="confidence-fill" style="width: ${data.confidence}">
                                ${data.confidence}
                            </div>
                        </div>
                    `;

            resultBox.classList.remove("hidden");
          } else {
            // Show error message
            document.getElementById("errorMessage").textContent =
              `Error: ${data.error}`;
            errorBox.classList.remove("hidden");
          }
        } catch (error) {
          // Handle network or other errors
          loadingBox.classList.add("hidden");
          document.getElementById("errorMessage").textContent =
            `Network Error: ${error.message}`;
          errorBox.classList.remove("hidden");
        }

        submitBtn.disabled = false; // Re-enable button
      });

      // Clear button: reset results
      document
        .getElementById("clearBtn")
        .addEventListener("click", function () {
          resultBox.classList.add("hidden");
          form.reset(); // Clear form fields
        });

      // Clear error button: hide error box
      document
        .getElementById("clearErrorBtn")
        .addEventListener("click", function () {
          errorBox.classList.add("hidden");
        });
    </script>
  </body>
</html>
